<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agar.io Clone</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #111;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      background: #111;
    }

    #overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    #overlay h1 {
      font-size: 3rem;
      margin-bottom: 2rem;
      color: #7ef7a0;
    }

    #nick {
      padding: 0.5rem;
      font-size: 1.2rem;
      border: 2px solid #7ef7a0;
      border-radius: 5px;
      background: #222;
      color: #fff;
      margin-bottom: 1rem;
      text-align: center;
    }

    #play-btn {
      padding: 0.75rem 1.5rem;
      font-size: 1.2rem;
      background: #7ef7a0;
      color: #111;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.3s;
    }

    #play-btn:hover {
      background: #5ed67a;
    }

    #status {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 1.1rem;
      background: rgba(0, 0, 0, 0.7);
      padding: 0.5rem;
      border-radius: 5px;
    }

    #mass {
      position: absolute;
      top: 10px;
      right: 170px;
      font-size: 1.1rem;
      background: rgba(0, 0, 0, 0.7);
      padding: 0.5rem;
      border-radius: 5px;
    }

    #leaderboard {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 150px;
      background: rgba(0, 0, 0, 0.7);
      border-radius: 5px;
      padding: 0.5rem;
    }

    #leaderboard h3 {
      margin-bottom: 0.5rem;
      text-align: center;
    }

    .entry {
      display: flex;
      justify-content: space-between;
      padding: 0.25rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .entry.me {
      background: rgba(126, 247, 160, 0.2);
      border-radius: 3px;
    }

    #mm {
      position: absolute;
      bottom: 10px;
      right: 10px;
      border: 2px solid #7ef7a0;
      border-radius: 5px;
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <canvas id="mm"></canvas>

  <div id="overlay">
    <h1>Agar.io Clone</h1>
    <input type="text" id="nick" placeholder="Enter your name" maxlength="16">
    <button id="play-btn">Play</button>
  </div>

  <div id="status">Connecting to server...</div>
  <div id="mass">Mass: 50</div>

  <div id="leaderboard">
    <h3>Leaderboard</h3>
    <div id="lb-entries"></div>
  </div>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const mm = document.getElementById('mm');
    const mmCtx = mm.getContext('2d');
    const statusEl = document.getElementById('status');
    const overlay = document.getElementById('overlay');
    const nickInput = document.getElementById('nick');
    const playBtn = document.getElementById('play-btn');
    const massEl = document.getElementById('mass');
    const lbEntries = document.getElementById('lb-entries');

    let socket = null;
    let clientId = null;
    let worldSize = 3000;
    let isJoined = false;
    let cameraX = 0;
    let cameraY = 0;
    let targetX = 0;
    let targetY = 0;
    let myMass = 100;
    let zoom = 0.5;
    let targetZoom = 0.5;
    let pendingJoinName = null;

    const players = {};
    const bots = {};
    const food = {};

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      mm.width = 150;
      mm.height = 150;
    }
    window.addEventListener('resize', resize);
    resize();

    function massToRadius(mass) {
      return Math.sqrt(mass / Math.PI) * 4;
    }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = `${protocol}//localhost:3000`;
      socket = new WebSocket(url);

      socket.addEventListener('open', () => {
        statusEl.textContent = 'Connected. Enter a name and join the game.';
        if (pendingJoinName) {
          socket.send(JSON.stringify({ type: 'join', name: pendingJoinName }));
          isJoined = true;
          overlay.style.display = 'none';
          statusEl.textContent = `Playing as ${pendingJoinName}. Move mouse to navigate.`;
          targetX = 0;
          targetY = 0;
          sendMove();
          pendingJoinName = null;
        }
      });

      socket.addEventListener('message', (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'welcome') {
          clientId = data.id;
          worldSize = data.worldSize;
          data.players.forEach((player) => {
            players[player.id] = player;
          });
          data.bots.forEach((bot) => {
            bots[bot.id] = bot;
          });
          data.food.forEach((f) => {
            food[f.id] = f;
          });
          statusEl.textContent = 'Waiting for you to join...';
        }

        if (data.type === 'death') {
          isJoined = false;
          overlay.style.display = 'flex';
          statusEl.textContent = 'You died! Click Play to respawn.';
        }

        if (data.type === 'state') {
          // Update players
          const nextPlayers = {};
          data.players.forEach((player) => {
            nextPlayers[player.id] = player;
          });
          Object.keys(players).forEach((id) => {
            if (!nextPlayers[id]) {
              delete players[id];
            }
          });
          Object.assign(players, nextPlayers);

          // Update bots
          const nextBots = {};
          data.bots.forEach((bot) => {
            nextBots[bot.id] = bot;
          });
          Object.keys(bots).forEach((id) => {
            if (!nextBots[id]) {
              delete bots[id];
            }
          });
          Object.assign(bots, nextBots);

          // Update food
          const nextFood = {};
          data.food.forEach((f) => {
            nextFood[f.id] = f;
          });
          Object.keys(food).forEach((id) => {
            if (!nextFood[id]) {
              delete food[id];
            }
          });
          Object.assign(food, nextFood);

          // Update leaderboard
          lbEntries.innerHTML = '';
          data.leaderboard.forEach((entry, index) => {
            const div = document.createElement('div');
            div.className = 'entry' + (entry.id === clientId ? ' me' : '');
            div.innerHTML = `
              <span>${index + 1}. ${entry.name}</span>
              <span>${Math.round(entry.mass)}</span>
            `;
            lbEntries.appendChild(div);
          });

          if (!isJoined) {
            statusEl.textContent = 'Connected. Enter name and join.';
          }
        }
      });

      socket.addEventListener('close', () => {
        statusEl.textContent = 'Disconnected from server.';
      });

      socket.addEventListener('error', () => {
        statusEl.textContent = 'Unable to connect to server.';
      });
    }

    function sendMove() {
      if (!isJoined || !socket || socket.readyState !== WebSocket.OPEN) {
        return;
      }
      socket.send(JSON.stringify({ type: 'move', x: targetX, y: targetY }));
    }

    playBtn.addEventListener('click', () => {
      const name = nickInput.value.trim().slice(0, 16) || 'Player';
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        pendingJoinName = name;
        statusEl.textContent = 'Connecting to server...';
        connect();
        return;
      }
      socket.send(JSON.stringify({ type: 'join', name }));
      isJoined = true;
      overlay.style.display = 'none';
      statusEl.textContent = `Playing as ${name}. Move mouse to navigate.`;
      targetX = 0;
      targetY = 0;
      sendMove();
    });

    window.addEventListener('mousemove', (event) => {
      if (!isJoined) {
        return;
      }
      const rect = canvas.getBoundingClientRect();
      const mouseX = event.clientX - rect.left;
      const mouseY = event.clientY - rect.top;

      // Convert screen coordinates to world coordinates
      const worldMouseX = cameraX + mouseX / zoom;
      const worldMouseY = cameraY + mouseY / zoom;

      targetX = worldMouseX;
      targetY = worldMouseY;
    });

    setInterval(sendMove, 50);

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (!isJoined || !players[clientId]) {
        requestAnimationFrame(draw);
        return;
      }

      const me = players[clientId];
      myMass = me.mass;
      massEl.textContent = `Mass: ${Math.round(myMass)}`;

      // Camera follows player
      const targetCamX = me.x - canvas.width / 2 / zoom;
      const targetCamY = me.y - canvas.height / 2 / zoom;
      cameraX += (targetCamX - cameraX) * 0.1;
      cameraY += (targetCamY - cameraY) * 0.1;

      // Zoom based on mass - smooth transition
      const baseZoom = 1.5;
      targetZoom = baseZoom / Math.sqrt(myMass / 50);
      zoom += (targetZoom - zoom) * 0.03;

      // Draw grid
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      const gridSize = 200;
      const gridOffsetX = Math.floor(cameraX / gridSize) * gridSize;
      const gridOffsetY = Math.floor(cameraY / gridSize) * gridSize;
      
      for (let x = gridOffsetX - cameraX; x < canvas.width / zoom; x += gridSize) {
        const screenX = x * zoom;
        ctx.beginPath();
        ctx.moveTo(screenX, 0);
        ctx.lineTo(screenX, canvas.height);
        ctx.stroke();
      }
      for (let y = gridOffsetY - cameraY; y < canvas.height / zoom; y += gridSize) {
        const screenY = y * zoom;
        ctx.beginPath();
        ctx.moveTo(0, screenY);
        ctx.lineTo(canvas.width, screenY);
        ctx.stroke();
      }

      // Draw world border
      ctx.strokeStyle = '#7ef7a0';
      ctx.lineWidth = 3;
      const borderX = (0 - cameraX) * zoom;
      const borderY = (0 - cameraY) * zoom;
      const borderWidth = worldSize * zoom;
      const borderHeight = worldSize * zoom;
      ctx.strokeRect(borderX, borderY, borderWidth, borderHeight);

      // Draw food
      for (const id in food) {
        const f = food[id];
        const screenX = (f.x - cameraX) * zoom;
        const screenY = (f.y - cameraY) * zoom;
        const radius = massToRadius(f.mass);

        if (screenX + radius < 0 || screenX - radius > canvas.width ||
            screenY + radius < 0 || screenY - radius > canvas.height) {
          continue;
        }

        ctx.beginPath();
        ctx.fillStyle = f.color;
        ctx.arc(screenX, screenY, radius * zoom, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw bots
      for (const id in bots) {
        const bot = bots[id];
        const screenX = (bot.x - cameraX) * zoom;
        const screenY = (bot.y - cameraY) * zoom;
        const radius = massToRadius(bot.mass);

        if (screenX + radius < 0 || screenX - radius > canvas.width ||
            screenY + radius < 0 || screenY - radius > canvas.height) {
          continue;
        }

        ctx.beginPath();
        ctx.fillStyle = bot.color;
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.arc(screenX, screenY, radius * zoom, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        ctx.font = `${Math.max(12, radius * zoom * 0.3)}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(bot.name, screenX, screenY - radius * zoom - 5);
      }

      // Draw players
      for (const id in players) {
        const player = players[id];
        const screenX = (player.x - cameraX) * zoom;
        const screenY = (player.y - cameraY) * zoom;
        const radius = massToRadius(player.mass);

        if (screenX + radius < 0 || screenX - radius > canvas.width ||
            screenY + radius < 0 || screenY - radius > canvas.height) {
          continue;
        }

        ctx.beginPath();
        ctx.fillStyle = player.color;
        ctx.strokeStyle = id === clientId ? '#ffffff' : 'rgba(255,255,255,0.3)';
        ctx.lineWidth = id === clientId ? 4 : 2;
        ctx.arc(screenX, screenY, radius * zoom, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        ctx.font = `${Math.max(12, radius * zoom * 0.3)}px Arial`;
        ctx.textAlign = 'center';
        ctx.fillText(player.name, screenX, screenY - radius * zoom - 5);
      }

      // Draw minimap
      mmCtx.fillStyle = '#000';
      mmCtx.fillRect(0, 0, 150, 150);

      // Draw world border
      mmCtx.strokeStyle = '#fff';
      mmCtx.lineWidth = 1;
      mmCtx.strokeRect(0, 0, 150, 150);

      // Draw players on minimap
      for (const id in players) {
        const player = players[id];
        const mmX = (player.x / worldSize) * 150;
        const mmY = (player.y / worldSize) * 150;
        const mmRadius = Math.max(2, massToRadius(player.mass) / worldSize * 150);

        mmCtx.beginPath();
        mmCtx.fillStyle = player.color;
        mmCtx.arc(mmX, mmY, mmRadius, 0, Math.PI * 2);
        mmCtx.fill();
      }

      // Draw bots on minimap
      for (const id in bots) {
        const bot = bots[id];
        const mmX = (bot.x / worldSize) * 150;
        const mmY = (bot.y / worldSize) * 150;
        const mmRadius = Math.max(1, massToRadius(bot.mass) / worldSize * 150);

        mmCtx.beginPath();
        mmCtx.fillStyle = bot.color;
        mmCtx.arc(mmX, mmY, mmRadius, 0, Math.PI * 2);
        mmCtx.fill();
      }

      // Draw camera view on minimap
      const viewLeft = (cameraX / worldSize) * 150;
      const viewTop = (cameraY / worldSize) * 150;
      const viewWidth = (canvas.width / zoom / worldSize) * 150;
      const viewHeight = (canvas.height / zoom / worldSize) * 150;

      mmCtx.strokeStyle = '#7ef7a0';
      mmCtx.lineWidth = 2;
      mmCtx.strokeRect(viewLeft, viewTop, viewWidth, viewHeight);

      requestAnimationFrame(draw);
    }

    connect();
    draw();
  </script>
</body>
</html>
