<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agar.io Multiplayer</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      background: #111;
      color: #fff;
      font-family: "Segoe UI", sans-serif;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }

    #ui {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    #mass {
      position: absolute;
      top: 18px;
      right: 24px;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
      letter-spacing: 1px;
    }

    #leaderboard {
      position: absolute;
      top: 18px;
      left: 24px;
      color: #fff;
      font-size: 13px;
      background: rgba(0, 0, 0, 0.45);
      padding: 10px 16px;
      border-radius: 10px;
      min-width: 140px;
      backdrop-filter: blur(4px);
    }
    #leaderboard h3 {
      font-size: 12px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 6px;
    }
    #leaderboard .entry {
      padding: 2px 0;
      display: flex;
      justify-content: space-between;
    }
    #leaderboard .entry.me {
      color: #7ef7a0;
      font-weight: 700;
    }

    #minimap {
      position: absolute;
      bottom: 18px;
      right: 18px;
      width: 150px;
      height: 150px;
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      background: rgba(0, 0, 0, 0.4);
      overflow: hidden;
    }
    #minimap canvas {
      width: 150px;
      height: 150px;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 20, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      pointer-events: all;
    }
    #overlay h1 {
      font-size: 64px;
      font-weight: 900;
      color: #7ef7a0;
      letter-spacing: -2px;
      text-shadow: 0 0 40px rgba(126, 247, 160, 0.5);
      margin-bottom: 8px;
    }
    #overlay p {
      color: #888;
      font-size: 15px;
      margin-bottom: 28px;
    }
    #overlay input {
      background: rgba(255, 255, 255, 0.08);
      border: 1.5px solid rgba(255, 255, 255, 0.2);
      color: #fff;
      font-size: 18px;
      padding: 10px 20px;
      border-radius: 8px;
      outline: none;
      text-align: center;
      margin-bottom: 16px;
      width: 240px;
    }
    #overlay input::placeholder {
      color: #555;
    }
    #overlay button {
      background: #7ef7a0;
      color: #111;
      font-size: 18px;
      font-weight: 700;
      border: none;
      padding: 12px 48px;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
      transition:
        transform 0.1s,
        box-shadow 0.1s;
      box-shadow: 0 4px 24px rgba(126, 247, 160, 0.3);
    }
    #overlay button:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 32px rgba(126, 247, 160, 0.5);
    }

    #status {
      position: fixed;
      left: 16px;
      top: 16px;
      color: #b7d7ff;
      font-size: 13px;
      z-index: 5;
      background: rgba(0, 0, 0, 0.35);
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui">
    <div id="mass">Mass: 20</div>
    <div id="leaderboard">
      <h3>Leaderboard</h3>
      <div id="lb-entries"></div>
    </div>
    <div id="minimap"><canvas id="mm"></canvas></div>
  </div>

  <div id="status">Connecting to server...</div>

  <div id="overlay">
    <h1>agar.io</h1>
    <p>Move your mouse to navigate. Eat smaller cells to grow.</p>
    <input
      id="nick"
      type="text"
      placeholder="Enter your name"
      maxlength="16"
    />
    <button id="play-btn">PLAY</button>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const mm = document.getElementById("mm");
    const mmCtx = mm.getContext("2d");
    const statusEl = document.getElementById("status");
    const overlay = document.getElementById("overlay");
    const nickInput = document.getElementById("nick");
    const playBtn = document.getElementById("play-btn");
    const massEl = document.getElementById("mass");
    const lbEntries = document.getElementById("lb-entries");

    let socket = null;
    let clientId = null;
    let worldSize = 4000;
    let isJoined = false;
    let cameraX = 0;
    let cameraY = 0;
    let targetX = 0;
    let targetY = 0;
    let myMass = 20;

    const players = {};
    const bots = {};
    const food = {};

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      mm.width = 150;
      mm.height = 150;
    }
    window.addEventListener("resize", resize);
    resize();

    function massToRadius(mass) {
      return Math.sqrt(mass / Math.PI) * 4;
    }

    function connect() {
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const url = \\//\\;
      socket = new WebSocket(url);

      socket.addEventListener('open', () => {
        statusEl.textContent = 'Connected. Enter a name and join the game.';
      });

      socket.addEventListener('message', (event) => {
        const data = JSON.parse(event.data);
        if (data.type === 'welcome') {
          clientId = data.id;
          worldSize = data.worldSize;
          data.players.forEach((player) => {
            players[player.id] = player;
          });
          data.bots.forEach((bot) => {
            bots[bot.id] = bot;
          });
          data.food.forEach((f) => {
            food[f.id] = f;
          });
          statusEl.textContent = 'Waiting for you to join...';
        }

        if (data.type === 'state') {
          // Update players
          const nextPlayers = {};
          data.players.forEach((player) => {
            nextPlayers[player.id] = player;
          });
          Object.keys(players).forEach((id) => {
            if (!nextPlayers[id]) {
              delete players[id];
            }
          });
          Object.assign(players, nextPlayers);

          // Update bots
          const nextBots = {};
          data.bots.forEach((bot) => {
            nextBots[bot.id] = bot;
          });
          Object.keys(bots).forEach((id) => {
            if (!nextBots[id]) {
              delete bots[id];
            }
          });
          Object.assign(bots, nextBots);

          // Update food
          const nextFood = {};
          data.food.forEach((f) => {
            nextFood[f.id] = f;
          });
          Object.keys(food).forEach((id) => {
            if (!nextFood[id]) {
              delete food[id];
            }
          });
          Object.assign(food, nextFood);

          // Update leaderboard
          lbEntries.innerHTML = '';
          data.leaderboard.forEach((entry, index) => {
            const div = document.createElement('div');
            div.className = 'entry' + (entry.id === clientId ? ' me' : '');
            div.innerHTML = \
              <span>\. \</span>
              <span>\</span>
            \;
            lbEntries.appendChild(div);
          });

          if (!isJoined) {
            statusEl.textContent = 'Connected. Enter name and join.';
          }
        }
      });

      socket.addEventListener('close', () => {
        statusEl.textContent = 'Disconnected from server.';
      });

      socket.addEventListener('error', () => {
        statusEl.textContent = 'Unable to connect to server.';
      });
    }

    function sendMove() {
      if (!isJoined || !socket || socket.readyState !== WebSocket.OPEN) {
        return;
      }
      socket.send(JSON.stringify({ type: 'move', x: targetX, y: targetY }));
    }

    playBtn.addEventListener('click', () => {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        return;
      }
      const name = nickInput.value.trim().slice(0, 16) || \Player\;
      socket.send(JSON.stringify({ type: 'join', name }));
      isJoined = true;
      overlay.style.display = 'none';
      statusEl.textContent = \Playing as \. Move mouse to navigate.\;
      sendMove();
    });

    window.addEventListener('mousemove', (event) => {
      if (!isJoined) {
        return;
      }
      const rect = canvas.getBoundingClientRect();
      const mouseX = event.clientX - rect.left;
      const mouseY = event.clientY - rect.top;

      // Convert screen coordinates to world coordinates
      const worldMouseX = cameraX + (mouseX - canvas.width / 2) / zoom;
      const worldMouseY = cameraY + (mouseY - canvas.height / 2) / zoom;

      targetX = worldMouseX;
      targetY = worldMouseY;
    });

    setInterval(sendMove, 50);

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      if (!isJoined || !players[clientId]) {
        requestAnimationFrame(draw);
        return;
      }

      const me = players[clientId];
      myMass = me.mass;
      massEl.textContent = \Mass: \\;

      // Camera follows player
      const targetCamX = me.x - canvas.width / 2 / zoom;
      const targetCamY = me.y - canvas.height / 2 / zoom;
      cameraX += (targetCamX - cameraX) * 0.1;
      cameraY += (targetCamY - cameraY) * 0.1;

      // Zoom based on mass
      const baseZoom = 0.5;
      const zoom = baseZoom / Math.sqrt(myMass / 20);

      // Draw grid
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      const gridSize = 200;
      for (let x = -cameraX % gridSize; x < canvas.width; x += gridSize * zoom) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = -cameraY % gridSize; y < canvas.height; y += gridSize * zoom) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }

      // Draw food
      for (const id in food) {
        const f = food[id];
        const screenX = (f.x - cameraX) * zoom;
        const screenY = (f.y - cameraY) * zoom;
        const radius = massToRadius(f.mass);

        if (screenX + radius < 0 || screenX - radius > canvas.width ||
            screenY + radius < 0 || screenY - radius > canvas.height) {
          continue;
        }

        ctx.beginPath();
        ctx.fillStyle = f.color;
        ctx.arc(screenX, screenY, radius * zoom, 0, Math.PI * 2);
        ctx.fill();
      }

      // Draw bots
      for (const id in bots) {
        const bot = bots[id];
        const screenX = (bot.x - cameraX) * zoom;
        const screenY = (bot.y - cameraY) * zoom;
        const radius = massToRadius(bot.mass);

        if (screenX + radius < 0 || screenX - radius > canvas.width ||
            screenY + radius < 0 || screenY - radius > canvas.height) {
          continue;
        }

        ctx.beginPath();
        ctx.fillStyle = bot.color;
        ctx.strokeStyle = 'rgba(255,255,255,0.3)';
        ctx.lineWidth = 2;
        ctx.arc(screenX, screenY, radius * zoom, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        ctx.font = \\px Arial\;
        ctx.textAlign = 'center';
        ctx.fillText(bot.name, screenX, screenY - radius * zoom - 5);
      }

      // Draw players
      for (const id in players) {
        const player = players[id];
        const screenX = (player.x - cameraX) * zoom;
        const screenY = (player.y - cameraY) * zoom;
        const radius = massToRadius(player.mass);

        if (screenX + radius < 0 || screenX - radius > canvas.width ||
            screenY + radius < 0 || screenY - radius > canvas.height) {
          continue;
        }

        ctx.beginPath();
        ctx.fillStyle = player.color;
        ctx.strokeStyle = id === clientId ? '#ffffff' : 'rgba(255,255,255,0.3)';
        ctx.lineWidth = id === clientId ? 4 : 2;
        ctx.arc(screenX, screenY, radius * zoom, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();

        ctx.fillStyle = '#ffffff';
        ctx.font = \\px Arial\;
        ctx.textAlign = 'center';
        ctx.fillText(player.name, screenX, screenY - radius * zoom - 5);
      }

      // Draw minimap
      mmCtx.fillStyle = '#000';
      mmCtx.fillRect(0, 0, 150, 150);

      // Draw world border
      mmCtx.strokeStyle = '#fff';
      mmCtx.lineWidth = 1;
      mmCtx.strokeRect(0, 0, 150, 150);

      // Draw players on minimap
      for (const id in players) {
        const player = players[id];
        const mmX = (player.x / worldSize) * 150;
        const mmY = (player.y / worldSize) * 150;
        const mmRadius = Math.max(2, massToRadius(player.mass) / worldSize * 150);

        mmCtx.beginPath();
        mmCtx.fillStyle = player.color;
        mmCtx.arc(mmX, mmY, mmRadius, 0, Math.PI * 2);
        mmCtx.fill();
      }

      // Draw bots on minimap
      for (const id in bots) {
        const bot = bots[id];
        const mmX = (bot.x / worldSize) * 150;
        const mmY = (bot.y / worldSize) * 150;
        const mmRadius = Math.max(1, massToRadius(bot.mass) / worldSize * 150);

        mmCtx.beginPath();
        mmCtx.fillStyle = bot.color;
        mmCtx.arc(mmX, mmY, mmRadius, 0, Math.PI * 2);
        mmCtx.fill();
      }

      // Draw camera view on minimap
      const viewLeft = (cameraX / worldSize) * 150;
      const viewTop = (cameraY / worldSize) * 150;
      const viewWidth = (canvas.width / zoom / worldSize) * 150;
      const viewHeight = (canvas.height / zoom / worldSize) * 150;

      mmCtx.strokeStyle = '#7ef7a0';
      mmCtx.lineWidth = 2;
      mmCtx.strokeRect(viewLeft, viewTop, viewWidth, viewHeight);

      requestAnimationFrame(draw);
    }

    connect();
    draw();
  </script>
</body>
</html>
