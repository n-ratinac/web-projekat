<!DOCTYPE html>
<html lang="sr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>agar.io — Multiplayer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }

    #score {
      position: fixed; top: 18px; right: 24px;
      color: #fff; font-size: 22px; font-weight: 700;
      text-shadow: 0 2px 8px rgba(0,0,0,.7); letter-spacing: 1px; z-index: 10;
    }

    #leaderboard {
      position: fixed; top: 18px; left: 24px;
      color: #fff; font-size: 13px;
      background: rgba(0,0,0,.45); padding: 10px 16px;
      border-radius: 10px; min-width: 140px;
      backdrop-filter: blur(4px); z-index: 10;
    }
    #leaderboard h3 { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #aaa; margin-bottom: 6px; }
    #leaderboard .entry { padding: 2px 0; }
    #leaderboard .me { color: #7ef7a0; font-weight: 700; }

    #minimap {
      position: fixed; bottom: 18px; right: 18px;
      width: 130px; height: 130px;
      border: 2px solid rgba(255,255,255,.2);
      border-radius: 8px; background: rgba(0,0,0,.4);
      overflow: hidden; z-index: 10;
    }
    #mm { width: 130px; height: 130px; }

    #hints {
      position: fixed; bottom: 18px; left: 24px;
      color: #555; font-size: 12px; line-height: 1.8; z-index: 10;
    }

    /* ── OVERLAY ── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(10,10,20,.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100;
    }
    #overlay h1 {
      font-size: 64px; font-weight: 900; color: #7ef7a0;
      letter-spacing: -2px; text-shadow: 0 0 40px rgba(126,247,160,.5);
      margin-bottom: 8px;
    }
    #overlay p { color: #888; font-size: 15px; margin-bottom: 28px; }
    #overlay input {
      background: rgba(255,255,255,.08);
      border: 1.5px solid rgba(255,255,255,.2);
      color: #fff; font-size: 18px; padding: 10px 20px;
      border-radius: 8px; outline: none; text-align: center;
      margin-bottom: 16px; width: 240px;
    }
    #overlay input::placeholder { color: #555; }
    #overlay button {
      background: #7ef7a0; color: #111; font-size: 18px; font-weight: 700;
      border: none; padding: 12px 48px; border-radius: 8px; cursor: pointer;
      letter-spacing: 1px; box-shadow: 0 4px 24px rgba(126,247,160,.3);
      transition: transform .1s, box-shadow .1s;
    }
    #overlay button:hover { transform: scale(1.05); box-shadow: 0 6px 32px rgba(126,247,160,.5); }

    #conn-status {
      margin-top: 18px; font-size: 13px; color: #555;
    }
    #conn-status.ok  { color: #7ef7a0; }
    #conn-status.err { color: #f97; }

    /* ── DEAD ── */
    #dead-overlay {
      position: fixed; inset: 0; background: rgba(10,10,20,.88);
      display: none; flex-direction: column;
      align-items: center; justify-content: center; z-index: 100;
    }
    #dead-overlay h2 { font-size: 48px; font-weight: 900; color: #f97; margin-bottom: 8px; }
    #dead-overlay p  { color: #888; font-size: 15px; margin-bottom: 6px; }
    .final-score { font-size: 28px; color: #fff; font-weight: 700; margin-bottom: 24px; }
    #dead-overlay button {
      background: #7ef7a0; color: #111; font-size: 16px; font-weight: 700;
      border: none; padding: 12px 40px; border-radius: 8px; cursor: pointer;
    }
  </style>
</head>
<body>

<canvas id="game"></canvas>
<div id="score">Mass: 0</div>
<div id="leaderboard"><h3>Leaderboard</h3><div id="lb-entries"></div></div>
<div id="minimap"><canvas id="mm"></canvas></div>
<div id="hints">
  <b style="color:#777">W</b> — baci masu &nbsp;&nbsp;
  <b style="color:#777">Space</b> — podeli
</div>

<div id="overlay">
  <h1>agar.io</h1>
  <p>Multiplayer — kreće na nasumičnoj poziciji</p>
  <input id="nick" type="text" placeholder="Upiši ime" maxlength="16" />
  <button id="play-btn">PLAY</button>
  <div id="conn-status">Konektovanje na server...</div>
</div>

<div id="dead-overlay">
  <h2>Umro si!</h2>
  <p>Finalni skor</p>
  <div class="final-score" id="final-score">0</div>
  <button id="respawn-btn">Igraj ponovo</button>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const WORLD     = 4000;
const WS_URL    = `ws://${window.location.hostname}:8765`;
const GRID_SIZE = 50;

// ─── UTILS ───────────────────────────────────────────────────────────────────
const clamp   = (v,lo,hi) => Math.max(lo,Math.min(hi,v));
const hslStr  = (h,s,l)   => `hsl(${h},${s}%,${l}%)`;
const massToR = m => Math.sqrt(m / Math.PI) * 4;

// ─── CANVAS ──────────────────────────────────────────────────────────────────
const canvas = document.getElementById("game");
const ctx    = canvas.getContext("2d");
const mm     = document.getElementById("mm");
const mmCtx  = mm.getContext("2d");

function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  mm.width = mm.height = 130;
}
window.addEventListener("resize", resize);
resize();

// ─── STATE ───────────────────────────────────────────────────────────────────
let myId     = null;
let myHue    = 0;
let myName   = "Player";
let food     = [];
let viruses  = [];
let remotePlayers = {};   // id -> {id, name, hue, cells[]}
let myCells  = [];        // lokalna kopija mojih ćelija (za render)
let mouseX   = window.innerWidth  / 2;
let mouseY   = window.innerHeight / 2;
let running  = false;
let animId   = null;

// kamera
let camX = WORLD/2, camY = WORLD/2, camZoom = 1;

// ─── WEBSOCKET ────────────────────────────────────────────────────────────────
let ws = null;

function connect() {
  const statusEl = document.getElementById("conn-status");
  statusEl.textContent = "Konektovanje...";
  statusEl.className   = "";

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    statusEl.textContent = "Povezan! Upiši ime i klikni PLAY.";
    statusEl.className   = "ok";
    document.getElementById("play-btn").disabled = false;
  };

  ws.onclose = () => {
    statusEl.textContent = "Veza prekinuta. Reload stranicu.";
    statusEl.className   = "err";
    running = false;
  };

  ws.onerror = () => {
    statusEl.textContent = "Ne mogu da se konektujem na ws://localhost:8765";
    statusEl.className   = "err";
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.type === "joined") {
      myId   = msg.id;
      myHue  = msg.hue;
      camX   = msg.x;
      camY   = msg.y;
      running = true;
      document.getElementById("overlay").style.display = "none";
      if (animId) cancelAnimationFrame(animId);
      loop();
    }

    if (msg.type === "respawned") {
      camX = msg.x; camY = msg.y;
      running = true;
      document.getElementById("dead-overlay").style.display = "none";
      if (animId) cancelAnimationFrame(animId);
      loop();
    }

    if (msg.type === "state") {
      food    = msg.state.food    || [];
      viruses = msg.state.viruses || [];

      // rebuild remote players map
      const newMap = {};
      for (const p of (msg.state.players || [])) {
        newMap[p.id] = p;
        if (p.id === myId) myCells = p.cells;
      }
      remotePlayers = newMap;

      if (msg.you_died) {
        running = false;
        const mass = myCells.reduce ? myCells.reduce((s,c)=>s+c.mass,0) : 0;
        document.getElementById("final-score").textContent = Math.floor(mass);
        document.getElementById("dead-overlay").style.display = "flex";
      }

      updateCamera();
      updateUI();
    }
  };
}

// ─── CAMERA ──────────────────────────────────────────────────────────────────
function updateCamera() {
  if (!myCells || !myCells.length) return;
  let totalMass = 0, wx = 0, wy = 0;
  for (const c of myCells) {
    wx += c.x * c.mass;
    wy += c.y * c.mass;
    totalMass += c.mass;
  }
  if (totalMass <= 0) return;
  camX = wx / totalMass;
  camY = wy / totalMass;
  camZoom = Math.min(1.5, Math.max(0.15, 64 / Math.sqrt(totalMass)));
}

function worldToScreen(wx, wy) {
  return [
    (wx - camX) * camZoom + canvas.width  / 2,
    (wy - camY) * camZoom + canvas.height / 2,
  ];
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function loop() {
  animId = requestAnimationFrame(loop);
  render();
  drawMinimap();
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#111318";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawGrid();
  drawBorder();

  for (const f of food)    drawFood(f);
  for (const v of viruses) drawVirus(v);

  // sve ćelije sortirane po masi (manje ispod)
  const allCells = [];
  for (const p of Object.values(remotePlayers)) {
    const isMe = p.id === myId;
    for (const c of p.cells) allCells.push({ c, hue: p.hue, isMe });
  }
  allCells.sort((a,b) => a.c.mass - b.c.mass);
  for (const {c, hue, isMe} of allCells) drawCell(c, hue, isMe ? 0.95 : 1);
}

function drawGrid() {
  ctx.strokeStyle = "rgba(255,255,255,0.04)";
  ctx.lineWidth   = 1;
  const startX = Math.floor((camX - canvas.width /2/camZoom)/GRID_SIZE)*GRID_SIZE;
  const startY = Math.floor((camY - canvas.height/2/camZoom)/GRID_SIZE)*GRID_SIZE;
  const endX   = camX + canvas.width /2/camZoom;
  const endY   = camY + canvas.height/2/camZoom;
  ctx.beginPath();
  for (let x=startX; x<endX; x+=GRID_SIZE) {
    const sx = (x-camX)*camZoom + canvas.width/2;
    ctx.moveTo(sx,0); ctx.lineTo(sx,canvas.height);
  }
  for (let y=startY; y<endY; y+=GRID_SIZE) {
    const sy = (y-camY)*camZoom + canvas.height/2;
    ctx.moveTo(0,sy); ctx.lineTo(canvas.width,sy);
  }
  ctx.stroke();
}

function drawBorder() {
  const corners = [[0,0],[WORLD,0],[WORLD,WORLD],[0,WORLD]];
  ctx.strokeStyle = "rgba(255,80,80,0.5)";
  ctx.lineWidth   = 3;
  ctx.beginPath();
  for (let i=0;i<4;i++) {
    const [sx,sy] = worldToScreen(corners[i][0], corners[i][1]);
    if (i===0) ctx.moveTo(sx,sy); else ctx.lineTo(sx,sy);
  }
  ctx.closePath();
  ctx.stroke();
}

function drawCell(c, hue, alpha=1) {
  const [sx,sy] = worldToScreen(c.x, c.y);
  const sr = c.r * camZoom;
  if (sx+sr<0||sx-sr>canvas.width||sy+sr<0||sy-sr>canvas.height) return;

  ctx.globalAlpha = alpha;
  ctx.shadowColor = hslStr(hue,80,60);
  ctx.shadowBlur  = sr * 0.3;

  ctx.beginPath();
  ctx.arc(sx,sy,sr,0,Math.PI*2);
  const g = ctx.createRadialGradient(sx-sr*.3,sy-sr*.3,sr*.1,sx,sy,sr);
  g.addColorStop(0, hslStr(hue,70,75));
  g.addColorStop(1, hslStr(hue,80,45));
  ctx.fillStyle = g;
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = hslStr(hue,60,35);
  ctx.lineWidth   = Math.max(1, sr*.06);
  ctx.stroke();

  if (sr > 16) {
    ctx.globalAlpha = 1;
    ctx.fillStyle = "#fff";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    const fs = clamp(sr*.45,10,36);
    ctx.font = `bold ${fs}px Segoe UI`;
    ctx.shadowColor = "rgba(0,0,0,0.6)";
    ctx.shadowBlur  = 4;
    if (c.name) ctx.fillText(c.name, sx, sy - fs*.3);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;
}

function drawVirus(v) {
  const [sx,sy] = worldToScreen(v.x, v.y);
  const sr = v.r * camZoom;
  if (sx+sr<0||sx-sr>canvas.width||sy+sr<0||sy-sr>canvas.height) return;
  ctx.save();
  ctx.translate(sx,sy);
  const spikes = 12, innerR = sr*.75;
  ctx.beginPath();
  for (let i=0;i<spikes*2;i++) {
    const angle = (i/(spikes*2))*Math.PI*2 - Math.PI/2;
    const r = i%2===0 ? sr : innerR;
    if (i===0) ctx.moveTo(Math.cos(angle)*r, Math.sin(angle)*r);
    else       ctx.lineTo(Math.cos(angle)*r, Math.sin(angle)*r);
  }
  ctx.closePath();
  ctx.fillStyle   = "rgba(60,180,60,0.5)";
  ctx.strokeStyle = "#5f5";
  ctx.lineWidth   = 2;
  ctx.fill(); ctx.stroke();
  ctx.restore();
}

function drawFood(f) {
  const [sx,sy] = worldToScreen(f.x, f.y);
  const sr = Math.max(4, f.r * 1.5 * camZoom);
  if (sx+sr<0||sx-sr>canvas.width||sy+sr<0||sy-sr>canvas.height) return;
  ctx.beginPath();
  ctx.arc(sx,sy,sr,0,Math.PI*2);
  ctx.fillStyle = hslStr(f.hue,80,60);
  ctx.fill();
}

function drawMinimap() {
  const s = 130/WORLD;
  mmCtx.clearRect(0,0,130,130);
  mmCtx.fillStyle = "#0a0a14";
  mmCtx.fillRect(0,0,130,130);

  for (const f of food) {
    mmCtx.fillStyle = hslStr(f.hue,70,55);
    mmCtx.fillRect(f.x*s-.5, f.y*s-.5, 1, 1);
  }
  for (const p of Object.values(remotePlayers)) {
    const isMe = p.id === myId;
    for (const c of p.cells) {
      mmCtx.beginPath();
      mmCtx.arc(c.x*s, c.y*s, Math.max(isMe?2:1.5, c.r*s), 0, Math.PI*2);
      mmCtx.fillStyle = hslStr(p.hue, isMe?90:70, isMe?70:55);
      mmCtx.fill();
    }
  }
  // viewport rect
  const vw = (canvas.width  / camZoom) * s;
  const vh = (canvas.height / camZoom) * s;
  const vx = (camX - canvas.width /2/camZoom) * s;
  const vy = (camY - canvas.height/2/camZoom) * s;
  mmCtx.strokeStyle = "rgba(255,255,255,0.4)";
  mmCtx.lineWidth   = 1;
  mmCtx.strokeRect(vx,vy,vw,vh);
}

// ─── UI ──────────────────────────────────────────────────────────────────────
function updateUI() {
  if (!myId) return;
  const me = remotePlayers[myId];
  const mass = me ? Math.floor(me.cells.reduce((s,c)=>s+c.mass,0)) : 0;
  document.getElementById("score").textContent = `Mass: ${mass}`;

  const entries = [];
  for (const p of Object.values(remotePlayers)) {
    const m = Math.floor(p.cells.reduce((s,c)=>s+c.mass,0));
    entries.push({ name: p.name, mass: m, isMe: p.id===myId });
  }
  entries.sort((a,b) => b.mass - a.mass);
  document.getElementById("lb-entries").innerHTML = entries.slice(0,8).map(
    (e,i) => `<div class="entry ${e.isMe?"me":""}">${i+1}. ${e.name} — ${e.mass}</div>`
  ).join("");
}

// ─── INPUT ───────────────────────────────────────────────────────────────────
canvas.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;
  if (!running || !ws || ws.readyState !== WebSocket.OPEN) return;
  // pretvori u world koordinate
  const wx = (mouseX - canvas.width /2) / camZoom + camX;
  const wy = (mouseY - canvas.height/2) / camZoom + camY;
  ws.send(JSON.stringify({ type:"move", x:wx, y:wy }));
});

document.addEventListener("keydown", e => {
  if (!running || !ws || ws.readyState !== WebSocket.OPEN) return;
  if (e.code === "Space") { e.preventDefault(); ws.send(JSON.stringify({type:"split"})); }
  if (e.key  === "w" || e.key==="W") ws.send(JSON.stringify({type:"eject"}));
});

// ─── BUTTONS ─────────────────────────────────────────────────────────────────
document.getElementById("play-btn").disabled = true;

document.getElementById("play-btn").addEventListener("click", () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  myName = document.getElementById("nick").value.trim() || "Player";
  ws.send(JSON.stringify({ type:"join", name:myName }));
});

document.getElementById("nick").addEventListener("keydown", e => {
  if (e.key === "Enter") document.getElementById("play-btn").click();
});

document.getElementById("respawn-btn").addEventListener("click", () => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type:"respawn" }));
});

// ─── START ───────────────────────────────────────────────────────────────────
connect();
</script>
</body>
</html>
