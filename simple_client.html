y <!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Simple Game Client</title>
    <style>
      body {
        background: #222;
        margin: 0;
        overflow: hidden;
      }
      #gameCanvas {
        background: #111;
        display: block;
        margin: 0 auto;
      }
      #ui-container {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        display: flex;
        flex-direction: column; 
        gap: 10px;              
      }
      #connectBtn { 
        width: fit-content; 
      }
      #server-info { 
        color: #aaa; 
        font: 13px sans-serif; 
      }
      /* Stil za fiksni skor u gornjem desnom uglu */
      #score-hud {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 10;
        color: #fff;
        font: bold 24px Arial, sans-serif;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        display: none; /* Prikazuje se tek kada se igrač poveže */
      }
    </style>
  </head>
  <body>
    
    <div id="ui-container" style="position: absolute; top: 20px; left: 20px; z-index: 10; display: flex; flex-direction: column; gap: 10px;">
  
      <input type="text" id="nickInput" placeholder="Unesi ime..." maxlength="15" style="padding: 5px; border-radius: 4px; border: 1px solid #555; background: #333; color: white;">
    
      <button id="connectBtn" style="padding: 5px 15px; cursor: pointer; width: fit-content;">Connect</button>
      
      <span id="server-info" style="color: #aaa; font: 13px sans-serif;"></span>
    
    </div>

    <div id="score-hud">Score: 20</div>
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      // ─── SERVER URL ──────────────────────────────────────────────────────────────
      const DEFAULT_SERVER = "http://localhost:8080"; 
      const params = new URLSearchParams(window.location.search);
      const SERVER_URL = params.get("server") || DEFAULT_SERVER;
      document.getElementById("server-info").textContent = "→ " + SERVER_URL;
      // ─────────────────────────────────────────────────────────────────────────────
      const nickInput = document.getElementById("nickInput");
      const uiContainer = document.getElementById("ui-container");
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const connectBtn = document.getElementById("connectBtn");
      const scoreHud = document.getElementById("score-hud");
      
      let socket = null;
      let playerName = ""; // --------------------------------------------------------
      let player = { x: 400, y: 300, name: "" }; // ----------------------------------
      let world = [];      // Inicijalizovano kao prazan niz
      let foodItems = [];  // Inicijalizovano kao prazan niz
      let connected = false;
      let mouse = { x: 400, y: 300 };
      let lastDirection = { dx: 0, dy: 0 };

      connectBtn.onclick = () => {
        if (connected) return;

        playerName = nickInput.value.trim() || "Player" + Math.floor(Math.random() * 1000); // --------------------
        player.name = playerName; // -------------------------------------------------

        socket = io(SERVER_URL);
        
        socket.on("connect", () => {
          socket.emit("join", { name: playerName });
          connected = true;
          uiContainer.style.display = "none"; // -------------------------------------
          scoreHud.style.display = "block";   // Prikazujemo fiksni skor
        });

        socket.on("state", (state) => {
    world = state.players || []; 
    foodItems = state.food || []; 
    
    if (world.length > 0) {
        const me = world.find((p) => p.name === playerName);
        if (me && me.cells) {
            // Izračunaj ukupnu masu za prikaz u HUD-u
            let totalMass = me.cells.reduce((sum, c) => sum + c.mass, 0);
            scoreHud.textContent = "Score: " + Math.round(totalMass);
            
            // Ažuriraj lokalni player objekat da kamera zna gde da gleda
            player.x = me.cells[0].x;
            player.y = me.cells[0].y;
        }
    }
});
      };

      canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
      });
      
      window.addEventListener("keydown", (e) => {
       if (e.code === "Space" && connected && socket) {
        socket.emit("split", {}); // Šalje signal serveru da podeli igrača
         }
      });
      function sendDirection() {
        if (!socket || !connected) return;

        // Pošto je igrač uvek u centru ekrana, smer je razlika 
        // između pozicije miša i centra canvasa.
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;

        const dx = mouse.x - centerX;
        const dy = mouse.y - centerY;

        const len = Math.sqrt(dx * dx + dy * dy);
        
        // Ako je miš dovoljno daleko od centra, pošalji smer
        if (len > 10) {
          lastDirection = { dx: dx / len, dy: dy / len };
          socket.emit("update_input", lastDirection);
        }
      }

      let zoom = 1;

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. Pronađi tebe da bi odredili centar i zum
        const me = world.find((p) => p.name === playerName);
        
        // Inicijalizujemo zum na 1 (normalno) u slučaju da 'me' još nije učitan
        let zoom = 1.0; 

        ctx.save();
// Umesto me.x i me.y koristi poziciju prve ćelije
if (me && me.cells && me.cells.length > 0) {
    let leadCell = me.cells[0]; // Kamera prati prvu ćeliju
    zoom = Math.pow(20 / (leadCell.mass || 20), 0.4); 

    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(zoom, zoom);
    ctx.translate(-leadCell.x, -leadCell.y);
}

        // 2. ISCRTAVANJE GRANICA MAPE
        ctx.strokeStyle = "#ff0000"; 
        ctx.lineWidth = 10;
        ctx.strokeRect(0, 0, 4000, 4000); // Granice 4000x4000
        
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, 0, 4000, 4000);

        // 3. CRTANJE HRANE
        for (const f of foodItems) {
            ctx.beginPath();
            ctx.arc(f.x, f.y, 5, 0, 2 * Math.PI); 
            ctx.fillStyle = "#ff0";
            ctx.fill();
            ctx.closePath();
        }

    // 4. CRTANJE IGRAČA
for (const p of world) {
    // Proveri da li igrač uopšte ima ćelije pre nego što kreneš da crtaš
    if (p.cells && p.cells.length > 0) {
        for (const cell of p.cells) {
            let radius = Math.sqrt(cell.mass || 20) * 4; 
            
            ctx.beginPath();
            ctx.arc(cell.x, cell.y, radius, 0, 2 * Math.PI);
            ctx.fillStyle = p.name === playerName ? "#0f0" : "#09f";
            ctx.fill();
            
            ctx.strokeStyle = "rgba(255, 255, 255, 0.5)";
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.closePath();

            // Ime iznad ćelije
            ctx.font = `bold ${Math.max(10, radius/2)}px Arial`;
            ctx.textAlign = "center";
            ctx.fillStyle = "#fff";
            ctx.fillText(p.name, cell.x, cell.y);
        }
    }
}

        ctx.restore();
      }

      function gameLoop() {
        if (connected) sendDirection();
        render();
        requestAnimationFrame(gameLoop);
      }
      
      gameLoop();
    </script>
  </body>
</html>
