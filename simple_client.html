<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Simple Game Client</title>
    <style>
      body {
        background: #222;
        margin: 0;
        overflow: hidden;
      }
      #gameCanvas {
        background: #111;
        display: block;
        margin: 0 auto;
      }
      #ui-container {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column; 
      gap: 10px;              
      }


      #connectBtn { 
      width: fit-content; 
      }

      #server-info { 
      color: #aaa; 
      font: 13px sans-serif; 
      }
    </style>
  </head>
  <body>
    
    <div id="ui-container" style="position: absolute; top: 20px; left: 20px; z-index: 10; display: flex; flex-direction: column; gap: 10px;">
  
      <input type="text" id="nickInput" placeholder="Unesi ime..." maxlength="15" style="padding: 5px; border-radius: 4px; border: 1px solid #555; background: #333; color: white;">
    
      <button id="connectBtn" style="padding: 5px 15px; cursor: pointer; width: fit-content;">Connect</button>
      
      <span id="server-info" style="color: #aaa; font: 13px sans-serif;"></span>
    
    </div>
    
    
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
      // ─── SERVER URL ──────────────────────────────────────────────────────────────
      const DEFAULT_SERVER = "http://localhost:8080"; 
      const params = new URLSearchParams(window.location.search);
      const SERVER_URL = params.get("server") || DEFAULT_SERVER;
      document.getElementById("server-info").textContent = "→ " + SERVER_URL;
      // ─────────────────────────────────────────────────────────────────────────────
      const nickInput = document.getElementById("nickInput");
      const uiContainer = document.getElementById("ui-container");
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const connectBtn = document.getElementById("connectBtn");
      
      let socket = null;
      let playerName = ""; // --------------------------------------------------------
      let player = { x: 400, y: 300, name: "" }; // ----------------------------------
      let world = [];      // Inicijalizovano kao prazan niz[cite: 6]
      let foodItems = [];  // Inicijalizovano kao prazan niz[cite: 6]
      let connected = false;
      let mouse = { x: 400, y: 300 };
      let lastDirection = { dx: 0, dy: 0 };

      connectBtn.onclick = () => {
        if (connected) return;

        playerName = nickInput.value.trim() || "Player" + Math.floor(Math.random() * 1000); // --------------------
        player.name = playerName; // -------------------------------------------------

        socket = io(SERVER_URL);
        
        socket.on("connect", () => {
          socket.emit("join", { name: playerName });
          connected = true;
          uiContainer.style.display = "none"; // -------------------------------------
        });

        socket.on("state", (state) => {
            // Ako state.players ne postoji, stavi prazan niz da 'find' ne baci grešku[cite: 6]
            world = state.players || []; 
            foodItems = state.food || []; 
            
            if (world.length > 0) {
                const me = world.find((p) => p.name === playerName);
                if (me) {
                    player.x = me.x;
                    player.y = me.y;
                }
            }
        });
      };

      canvas.addEventListener("mousemove", (e) => {
        const rect = canvas.getBoundingClientRect();
        mouse.x = e.clientX - rect.left;
        mouse.y = e.clientY - rect.top;
      });

function sendDirection() {
  if (!socket || !connected) return;

  // Pošto je igrač uvek u centru ekrana, smer je razlika 
  // između pozicije miša i centra canvasa.
  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;

  const dx = mouse.x - centerX;
  const dy = mouse.y - centerY;

  const len = Math.sqrt(dx * dx + dy * dy);
  
  // Ako je miš dovoljno daleko od centra, pošalji smer
  if (len > 10) {
    lastDirection = { dx: dx / len, dy: dy / len };
    socket.emit("update_input", lastDirection);
  }
}

    let zoom = 1;

    function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. Pronađi tebe da bi odredili centar i zum
    const me = world.find((p) => p.name === playerName);
    
    // Inicijalizujemo zum na 1 (normalno) u slučaju da 'me' još nije učitan
    let zoom = 1.0; 

    ctx.save();

    if (me) {
        // DINAMIČKI ZUM: što je veća masa, manji je zoom (vidi se šire)
       
        zoom = Math.pow(20 / (me.mass || 20), 0.4); 

        // KAMERA: Centriranje i primena zuma
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(zoom, zoom);
        ctx.translate(-me.x, -me.y);
    }

    // 2. ISCRTAVANJE GRANICA MAPE[cite: 14]
    ctx.strokeStyle = "#ff0000"; 
    ctx.lineWidth = 10;
    ctx.strokeRect(0, 0, 4000, 4000); // Granice 4000x4000[cite: 13, 14]
    
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(0, 0, 4000, 4000);

    // 3. CRTANJE HRANE[cite: 14]
    for (const f of foodItems) {
        ctx.beginPath();
        ctx.arc(f.x, f.y, 5, 0, 2 * Math.PI); 
        ctx.fillStyle = "#ff0";
        ctx.fill();
        ctx.closePath();
    }

    // 4. CRTANJE IGRAČA[cite: 14]
    for (const p of world) {
       
        let radius = Math.sqrt(p.mass || 20) * 4; 
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, radius, 0, 2 * Math.PI);
        ctx.fillStyle = p.name === playerName ? "#0f0" : "#09f";
        ctx.fill();
        
        // TANKA BELA LINIJA (Popravljeno da ne bude debela)[cite: 14]
        ctx.strokeStyle = "rgba(255, 255, 255, 0.5)"; 
        ctx.lineWidth = 2; 
        ctx.stroke();
        ctx.closePath();
        
        // IME IGRAČA (Skalirano sa zumom)[cite: 14]
        ctx.fillStyle = "#fff";
        // Delimo font sa zoom-om da ostane čitljiv dok rasteš[cite: 14]
        ctx.font = `${14 / zoom}px sans-serif`; 
        ctx.textAlign = "center";
        ctx.fillText(p.name, p.x, p.y - radius - (5 / zoom));
    }

    ctx.restore();
}
      function gameLoop() {
        if (connected) sendDirection();
        render();
        requestAnimationFrame(gameLoop);
      }
      
      gameLoop();
    </script>
  </body>
</html>
