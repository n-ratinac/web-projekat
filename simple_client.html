<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Simple Game Client</title>
    <style>
      body {
        background: #222;
        margin: 0;
        overflow: hidden;
      }
      #gameCanvas {
        background: #111;
        display: block;
        margin: 0 auto;
      }
      #ui-container {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 10;
        display: flex;
        flex-direction: column; 
        gap: 10px;              
      }
      #connectBtn { 
        width: fit-content; 
      }
      #server-info { 
        color: #aaa; 
        font: 13px sans-serif; 
      }
      /* Stil za fiksni skor u gornjem desnom uglu */
      #score-hud {
        position: absolute;
        top: 20px;
        right: 20px;
        z-index: 10;
        color: #fff;
        font: bold 24px Arial, sans-serif;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        pointer-events: none;
        display: none;
      }
      /* Leaderboard panel */
      #leaderboard {
        position: absolute;
        top: 60px;
        right: 20px;
        z-index: 10;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        padding: 10px 14px;
        color: #fff;
        font: 14px Arial, sans-serif;
        min-width: 180px;
        pointer-events: none;
        display: none;
      }
      #leaderboard h3 {
        margin: 0 0 8px 0;
        font-size: 15px;
        text-align: center;
        letter-spacing: 1px;
        color: #ffd700;
        text-transform: uppercase;
      }
      #leaderboard ol {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      #leaderboard li {
        display: flex;
        justify-content: space-between;
        padding: 3px 0;
        border-bottom: 1px solid rgba(255,255,255,0.07);
        gap: 12px;
      }
      #leaderboard li:last-child { border-bottom: none; }
      #leaderboard li.me { color: #0f0; font-weight: bold; }
      #leaderboard .lb-rank  { opacity: 0.6; min-width: 24px; }
      #leaderboard .lb-name  { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
      #leaderboard .lb-score { opacity: 0.85; }
      #leaderboard .lb-separator {
        text-align: center;
        color: rgba(255,255,255,0.3);
        font-size: 11px;
        padding: 2px 0;
      }
    </style>
  </head>
  <body>
    
    <div id="ui-container">
      <input type="text" id="nickInput" placeholder="Unesi ime..." maxlength="15" style="padding: 5px; border-radius: 4px; border: 1px solid #555; background: #333; color: white;">
      <button id="connectBtn" style="padding: 5px 15px; cursor: pointer; width: fit-content;">Connect</button>
      <span id="server-info"></span>
    </div>

    <div id="score-hud">Score: 20</div>

    <div id="leaderboard">
      <h3>Leaderboard</h3>
      <ol id="leaderboard-list"></ol>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
    <script>
      const DEFAULT_SERVER = "http://localhost:8080";
      const params = new URLSearchParams(window.location.search);
      const SERVER_URL = params.get("server") || DEFAULT_SERVER;
      document.getElementById("server-info").textContent = "→ " + SERVER_URL;

      const nickInput = document.getElementById("nickInput");
      const uiContainer = document.getElementById("ui-container");
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const connectBtn = document.getElementById("connectBtn");
      const scoreHud = document.getElementById("score-hud");
      const leaderboardEl = document.getElementById("leaderboard");
      const leaderboardList = document.getElementById("leaderboard-list");
      
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;

      let socket = null;
      let playerName = "";
      let playerPos = { x: 0, y: 0 };
      let world = [];
      let foodItems = [];
      let serverLeaderboard = [];
      let myServerRank = 0;
      let connected = false;
      let mouse = { x: canvas.width/2, y: canvas.height/2 };
      
      // Podaci koji stižu iz config.json preko servera
      let gameConfig = { 
        zoom_base: 20, 
        map_width: 4000, 
        map_height: 4000 
      };

      connectBtn.onclick = () => {
        if (connected) return;
        playerName = nickInput.value.trim() || "Player" + Math.floor(Math.random() * 1000);
        socket = io(SERVER_URL);
        
        socket.on("connect", () => {
          socket.emit("join", { name: playerName });
          connected = true;
          uiContainer.style.display = "none";
          scoreHud.style.display = "block";
          leaderboardEl.style.display = "block";
        });

        socket.on("state", (state) => {
            world = state.players || [];
            foodItems = state.food || [];
            serverLeaderboard = state.leaderboard || [];
            
            // Ako server šalje config, ažuriraj lokalno
            if (state.config) {
                gameConfig = state.config;
            }

            const me = world.find((p) => p.name === playerName);
            if (me) {
                playerPos.x = me.x;
                playerPos.y = me.y;
                // IZMENA (iz prvog rešenja): skor prikazuje ukupnu masu svih ćelija
                const totalMass = me.cells
                    ? me.cells.reduce((s, c) => s + c.mass, 0)
                    : me.mass;
                scoreHud.textContent = "Score: " + Math.round(totalMass);
            }

            // Rangiranje
            const inTop10 = serverLeaderboard.find((e) => e.name === playerName);
            if (inTop10) {
                myServerRank = inTop10.rank;
            } else {
                const sorted = [...world].sort((a, b) => b.mass - a.mass);
                myServerRank = sorted.findIndex((p) => p.name === playerName) + 1;
            }

            updateLeaderboard();
        });

        socket.on("death", () => {
            alert("Pojeo si se! Osveži stranicu za novu igru.");
            location.reload();
        });
      };

      window.addEventListener("resize", () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      });

      canvas.addEventListener("mousemove", (e) => {
        mouse.x = e.clientX;
        mouse.y = e.clientY;
      });

      document.addEventListener("keydown", (e) => {
        if (e.code === "Space" && connected && socket) {
          e.preventDefault();
          socket.emit("split", {});
        }
      });

      function sendDirection() {
        if (!socket || !connected) return;
        const dx = mouse.x - canvas.width / 2;
        const dy = mouse.y - canvas.height / 2;
        const len = Math.sqrt(dx * dx + dy * dy);
        if (len > 10) {
          socket.emit("update_input", { dx: dx / len, dy: dy / len });
        }
      }

      function render() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const me = world.find((p) => p.name === playerName);
        
        ctx.save();
        if (me) {
            // IZMENA (iz prvog rešenja): kamera prati lead cell, zoom računa totalMass
            const leadCell = (me.cells && me.cells.length > 0) ? me.cells[0] : me;
            const totalMass = me.cells
                ? me.cells.reduce((s, c) => s + c.mass, 0)
                : me.mass;
            let zoom = Math.pow(gameConfig.zoom_base / (totalMass || 20), 0.4);
            
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(zoom, zoom);
            ctx.translate(-leadCell.x, -leadCell.y);
        }

        // CRTANJE MAPE (Dimenzije iz configa)
        ctx.fillStyle = "#1a1a1a";
        ctx.fillRect(0, 0, gameConfig.map_width, gameConfig.map_height);
        ctx.strokeStyle = "#ff0000"; 
        ctx.lineWidth = 5;
        ctx.strokeRect(0, 0, gameConfig.map_width, gameConfig.map_height);

        // HRANA
        for (const f of foodItems) {
            ctx.beginPath();
            ctx.arc(f.x, f.y, 5, 0, 2 * Math.PI); 
            ctx.fillStyle = "#ff0";
            ctx.fill();
            ctx.closePath();
        }

        // IGRAČI
        // IZMENA (iz prvog rešenja): iteriramo kroz sve ćelije iz p.cells[]
        // umesto da primarnu crtamo posebno a split ćelije posebno
        for (const p of world) {
            const cellsToDraw = (p.cells && p.cells.length > 0)
                ? p.cells
                : [{ x: p.x, y: p.y, mass: p.mass }];

            for (const cell of cellsToDraw) {
                let radius = Math.sqrt(cell.mass) * 4;
                ctx.beginPath();
                ctx.arc(cell.x, cell.y, radius, 0, 2 * Math.PI);
                ctx.fillStyle = p.name === playerName ? "#0f0" : "#09f";
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();
                ctx.closePath();

                // Ime
                let fontSize = Math.max(12, Math.round(radius * 0.3));
                ctx.font = `bold ${fontSize}px Arial`;
                ctx.textAlign = "center";
                ctx.fillStyle = "white";
                ctx.strokeStyle = "black";
                ctx.lineWidth = 3;
                ctx.strokeText(p.name, cell.x, cell.y);
                ctx.fillText(p.name, cell.x, cell.y);
            }
        }
        ctx.restore();
      }

      function updateLeaderboard() {
        leaderboardList.innerHTML = "";
        serverLeaderboard.forEach((entry) => {
          const li = document.createElement("li");
          if (entry.name === playerName) li.classList.add("me");
          li.innerHTML = `<span class="lb-rank">#${entry.rank}</span><span class="lb-name">${entry.name}</span><span class="lb-score">${entry.mass}</span>`;
          leaderboardList.appendChild(li);
        });
        
        const myInTop10 = serverLeaderboard.some((e) => e.name === playerName);
        if (!myInTop10 && myServerRank > 0) {
          const me = world.find((p) => p.name === playerName);
          if (me) {
            const sep = document.createElement("li");
            sep.className = "lb-separator";
            sep.textContent = "· · ·";
            leaderboardList.appendChild(sep);
            const li = document.createElement("li");
            li.className = "me";
            li.innerHTML = `<span class="lb-rank">#${myServerRank}</span><span class="lb-name">${me.name}</span><span class="lb-score">${Math.round(me.mass)}</span>`;
            leaderboardList.appendChild(li);
          }
        }
      }

      function gameLoop() {
        if (connected) sendDirection();
        render();
        requestAnimationFrame(gameLoop);
      }
      gameLoop();
    </script>
  </body>
</html>
