<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agar.io — Connection Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050a0f;
    --panel: #0b1520;
    --border: #1a3a5c;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --text: #c8e6f5;
    --dim: #4a7a9b;
    --green: #00ff88;
    --red: #ff4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 10px 20px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 900;
    letter-spacing: .15em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,212,255,.5);
  }

  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--red);
    box-shadow: 0 0 8px var(--red);
    transition: all .3s;
    flex-shrink: 0;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }

  #status-text { font-size: .75rem; color: var(--dim); }

  .spacer { flex: 1; }

  /* Name input */
  #name-area { display: flex; gap: 8px; align-items: center; }
  #name-area label { font-size: .7rem; color: var(--dim); }
  #name-input {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: .8rem;
    padding: 4px 8px;
    width: 130px;
    outline: none;
    transition: border-color .2s;
  }
  #name-input:focus { border-color: var(--accent); }
  #name-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Share Tech Mono', monospace;
    font-size: .7rem;
    padding: 4px 10px;
    cursor: pointer;
    transition: background .2s;
  }
  #name-btn:hover { background: rgba(0,212,255,.1); }

  /* ── Main layout ── */
  .main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── Canvas wrapper ── */
  #canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 30% 30%, rgba(0,80,120,.15) 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(26,58,92,.25) 39px, rgba(26,58,92,.25) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(26,58,92,.25) 39px, rgba(26,58,92,.25) 40px),
      var(--bg);
  }

  canvas {
    display: block;
    cursor: crosshair;
  }

  /* mini coords */
  #coords {
    position: absolute;
    bottom: 10px; left: 10px;
    font-size: .65rem;
    color: var(--dim);
    pointer-events: none;
  }

  /* world border indicator */
  #zoom-info {
    position: absolute;
    bottom: 10px; right: 10px;
    font-size: .65rem;
    color: var(--dim);
    pointer-events: none;
  }

  /* ── Side panel ── */
  aside {
    width: 220px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    overflow: hidden;
  }

  aside h2 {
    font-family: 'Orbitron', sans-serif;
    font-size: .65rem;
    letter-spacing: .2em;
    color: var(--dim);
    padding: 12px 14px 8px;
    border-bottom: 1px solid var(--border);
  }

  #player-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  #player-list::-webkit-scrollbar { width: 4px; }
  #player-list::-webkit-scrollbar-track { background: transparent; }
  #player-list::-webkit-scrollbar-thumb { background: var(--border); }

  .player-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    font-size: .75rem;
    transition: background .15s;
    animation: fadeIn .3s ease;
  }
  .player-item:hover { background: rgba(255,255,255,.03); }
  .player-item.is-self { border-left: 2px solid var(--accent); }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateX(10px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  .player-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .player-name { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .player-coords { font-size: .6rem; color: var(--dim); }

  /* log */
  #log {
    border-top: 1px solid var(--border);
    height: 110px;
    overflow-y: auto;
    padding: 6px 10px;
  }
  #log::-webkit-scrollbar { width: 3px; }
  #log::-webkit-scrollbar-thumb { background: var(--border); }

  .log-entry {
    font-size: .6rem;
    color: var(--dim);
    line-height: 1.6;
    animation: fadeIn .2s ease;
  }
  .log-entry.join  { color: var(--green); }
  .log-entry.leave { color: var(--red); }
  .log-entry.self  { color: var(--accent); }
  .log-entry.info  { color: var(--accent2); }
</style>
</head>
<body>

<header>
  <div class="status-dot" id="dot"></div>
  <h1>AGAR.IO</h1>
  <span id="status-text">Konektujem...</span>
  <div class="spacer"></div>
  <div id="name-area">
    <label for="name-input">IME:</label>
    <input id="name-input" type="text" maxlength="20" placeholder="Igrač">
    <button id="name-btn">OK</button>
  </div>
</header>

<div class="main">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div id="coords">x: — &nbsp; y: —</div>
    <div id="zoom-info">zoom: 1.0×</div>
  </div>
  <aside>
    <h2>IGRAČI ONLINE</h2>
    <div id="player-list"></div>
    <div id="log"></div>
  </aside>
</div>

<script>
// ─── Config ──────────────────────────────────────────────
const WS_URL     = "ws://localhost:8765";
const WORLD_W    = 2000;
const WORLD_H    = 2000;
const CELL_R     = 22;
const GRID_STEP  = 80;
const SPEED      = 3.5;          // piksela po framu (max)
const SEND_HZ    = 20;           // koliko puta u sekundi šaljemo poziciju serveru
const LERP_OTHER = 0.18;         // brzina interpolacije tuđih igrača

// ─── State ───────────────────────────────────────────────
let ws, selfState = null;
const others = new Map();        // id → { ...serverState, renderX, renderY }

// ─── Canvas setup ────────────────────────────────────────
const canvas = document.getElementById("canvas");
const ctx    = canvas.getContext("2d");

function resize() {
  const wrap = document.getElementById("canvas-wrap");
  canvas.width  = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
window.addEventListener("resize", resize);
resize();

// ─── Mouse tracking ──────────────────────────────────────
let mouseX = null, mouseY = null;

canvas.addEventListener("mousemove", e => {
  const r = canvas.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
});
canvas.addEventListener("mouseleave", () => { mouseX = null; mouseY = null; });

// ─── Camera ──────────────────────────────────────────────
let cam = { x: WORLD_W/2, y: WORLD_H/2, zoom: 1 };
let targetCam = { x: WORLD_W/2, y: WORLD_H/2, zoom: 1 };

// ─── Movement & send loop ────────────────────────────────
let lastSendTime = 0;

function tickMovement(now) {
  if (!selfState || mouseX === null) return;

  const W = canvas.width, H = canvas.height;

  // Pretvori poziciju miša u world koordinate
  const worldMouseX = (mouseX - W/2) / cam.zoom + cam.x;
  const worldMouseY = (mouseY - H/2) / cam.zoom + cam.y;

  const dx = worldMouseX - selfState.x;
  const dy = worldMouseY - selfState.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  let vx = 0, vy = 0;
  if (dist > CELL_R * 0.5) {
    const speed = Math.min(SPEED, dist * 0.12);
    vx = (dx / dist) * speed;
    vy = (dy / dist) * speed;
    selfState.x = Math.max(0, Math.min(WORLD_W, selfState.x + vx));
    selfState.y = Math.max(0, Math.min(WORLD_H, selfState.y + vy));
  }

  // Kamera prati igrača
  targetCam.x = selfState.x;
  targetCam.y = selfState.y;

  // Throttled slanje serveru
  if (ws && ws.readyState === WebSocket.OPEN && now - lastSendTime > 1000 / SEND_HZ) {
    ws.send(JSON.stringify({ type: "move", x: selfState.x, y: selfState.y, vx, vy }));
    lastSendTime = now;
  }
}

// ─── Interpolacija tuđih igrača ──────────────────────────
function tickOthers() {
  others.forEach(p => {
    if (p.renderX === undefined) { p.renderX = p.x; p.renderY = p.y; }
    p.renderX += (p.x - p.renderX) * LERP_OTHER;
    p.renderY += (p.y - p.renderY) * LERP_OTHER;
  });
}

// ─── Draw ────────────────────────────────────────────────
function draw(now) {
  tickMovement(now);
  tickOthers();

  // Lerp camera
  cam.x    += (targetCam.x    - cam.x)    * 0.08;
  cam.y    += (targetCam.y    - cam.y)    * 0.08;
  cam.zoom += (targetCam.zoom - cam.zoom) * 0.08;

  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  ctx.save();
  ctx.translate(W/2 - cam.x * cam.zoom, H/2 - cam.y * cam.zoom);
  ctx.scale(cam.zoom, cam.zoom);

  // ── Grid ──
  ctx.strokeStyle = "rgba(26,58,92,.35)";
  ctx.lineWidth   = 1 / cam.zoom;
  const x0 = Math.floor((cam.x - W/(2*cam.zoom)) / GRID_STEP) * GRID_STEP;
  const y0 = Math.floor((cam.y - H/(2*cam.zoom)) / GRID_STEP) * GRID_STEP;
  const x1 = cam.x + W/(2*cam.zoom) + GRID_STEP;
  const y1 = cam.y + H/(2*cam.zoom) + GRID_STEP;
  for (let gx = x0; gx < x1; gx += GRID_STEP) {
    ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, WORLD_H); ctx.stroke();
  }
  for (let gy = y0; gy < y1; gy += GRID_STEP) {
    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(WORLD_W, gy); ctx.stroke();
  }

  // ── World border ──
  ctx.strokeStyle = "rgba(0,212,255,.4)";
  ctx.lineWidth   = 3 / cam.zoom;
  ctx.strokeRect(0, 0, WORLD_W, WORLD_H);

  // ── Draw all players ──
  // Tuđi igrači crtaju se na renderX/renderY (interpolovano)
  others.forEach(p => drawCell({
    ...p,
    x: p.renderX ?? p.x,
    y: p.renderY ?? p.y,
    isSelf: false,
  }));
  if (selfState) drawCell({ ...selfState, isSelf: true });

  ctx.restore();

  // ── HUD coords ──
  if (selfState) {
    document.getElementById("coords").textContent =
      `x: ${Math.round(selfState.x)}  y: ${Math.round(selfState.y)}`;
  }
  document.getElementById("zoom-info").textContent =
    `zoom: ${cam.zoom.toFixed(2)}×`;

  requestAnimationFrame(draw);
}

function drawCell(p) {
  const r = CELL_R;
  const grd = ctx.createRadialGradient(p.x - r*.3, p.y - r*.3, r*.1, p.x, p.y, r);
  grd.addColorStop(0, lighten(p.color, 50));
  grd.addColorStop(1, p.color);

  // Shadow glow
  ctx.shadowColor   = p.color;
  ctx.shadowBlur    = p.isSelf ? 22 : 12;

  ctx.beginPath();
  ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
  ctx.fillStyle = grd;
  ctx.fill();

  // Border
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = p.isSelf ? "#ffffff" : "rgba(255,255,255,.35)";
  ctx.lineWidth   = p.isSelf ? 2.5 : 1.5;
  ctx.stroke();

  // Name label
  const fontSize = Math.max(9, Math.min(14, r * .7));
  ctx.fillStyle   = "#fff";
  ctx.font        = `bold ${fontSize}px 'Share Tech Mono', monospace`;
  ctx.textAlign   = "center";
  ctx.textBaseline = "middle";
  ctx.shadowColor = "rgba(0,0,0,.8)";
  ctx.shadowBlur  = 4;
  ctx.fillText(p.name, p.x, p.y);
  ctx.shadowBlur  = 0;
}

function lighten(hex, amount) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + amount);
  g = Math.min(255, g + amount);
  b = Math.min(255, b + amount);
  return `rgb(${r},${g},${b})`;
}

// ─── WebSocket ───────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setStatus(true, "Konektovan");
    addLog("Konektovan na server.", "self");
  };

  ws.onclose = () => {
    setStatus(false, "Diskonektovan — pokušavam ponovo...");
    addLog("Konekcija prekinuta.", "leave");
    selfState = null;
    others.clear();
    refreshList();
    setTimeout(connect, 3000);
  };

  ws.onerror = () => {
    setStatus(false, "Greška u konekciji");
  };

  ws.onmessage = (e) => {
    let msg;
    try { msg = JSON.parse(e.data); } catch { return; }

    if (msg.type === "init") {
      selfState = msg.self;
      targetCam.x = selfState.x;
      targetCam.y = selfState.y;
      cam.x = selfState.x;
      cam.y = selfState.y;
      // Učitaj ime u input
      document.getElementById("name-input").value = selfState.name;
      msg.players.forEach(p => others.set(p.id, p));
      addLog(`Spawnovao si se na (${Math.round(selfState.x)}, ${Math.round(selfState.y)})`, "self");
      refreshList();
    }

    else if (msg.type === "player_joined") {
      others.set(msg.player.id, msg.player);
      addLog(`${msg.player.name} se pojavio.`, "join");
      refreshList();
    }

    else if (msg.type === "player_left") {
      const p = others.get(msg.id);
      if (p) { addLog(`${p.name} se odjavio.`, "leave"); others.delete(msg.id); }
      refreshList();
    }

    else if (msg.type === "player_updated") {
      const p = msg.player;
      if (selfState && p.id === selfState.id) { selfState = p; }
      else { others.set(p.id, p); }
      refreshList();
    }

    else if (msg.type === "player_moved") {
      if (others.has(msg.id)) {
        const p = others.get(msg.id);
        p.x = msg.x; p.y = msg.y;
      }
    }
  };
}

// ─── UI helpers ──────────────────────────────────────────
function setStatus(connected, text) {
  document.getElementById("dot").className = "status-dot" + (connected ? " connected" : "");
  document.getElementById("status-text").textContent = text;
}

function refreshList() {
  const list = document.getElementById("player-list");
  list.innerHTML = "";

  const all = [];
  if (selfState) all.push({ ...selfState, isSelf: true });
  others.forEach(p => all.push({ ...p, isSelf: false }));

  all.forEach(p => {
    const el = document.createElement("div");
    el.className = "player-item" + (p.isSelf ? " is-self" : "");
    el.innerHTML = `
      <div class="player-dot" style="background:${p.color}"></div>
      <div class="player-name">${escHtml(p.name)}${p.isSelf ? ' <span style="color:var(--accent);font-size:.55rem">[TI]</span>' : ''}</div>
      <div class="player-coords">${Math.round(p.x)},${Math.round(p.y)}</div>
    `;
    list.appendChild(el);
  });
}

const logEl = document.getElementById("log");
function addLog(text, type = "info") {
  const ts = new Date().toLocaleTimeString("sr", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
  const el = document.createElement("div");
  el.className = `log-entry ${type}`;
  el.textContent = `[${ts}] ${text}`;
  logEl.appendChild(el);
  logEl.scrollTop = logEl.scrollHeight;
  if (logEl.children.length > 60) logEl.removeChild(logEl.firstChild);
}

function escHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─── Ime ─────────────────────────────────────────────────
document.getElementById("name-btn").addEventListener("click", sendName);
document.getElementById("name-input").addEventListener("keydown", e => {
  if (e.key === "Enter") sendName();
});

function sendName() {
  const name = document.getElementById("name-input").value.trim();
  if (!name || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: "set_name", name }));
  if (selfState) selfState.name = name;
  refreshList();
}

// ─── Start ───────────────────────────────────────────────
connect();
requestAnimationFrame(draw);
</script>
</body>
</html>
