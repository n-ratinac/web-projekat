<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<title>Agar.io — Connection Test</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #050a0f; --panel: #0b1520; --border: #1a3a5c;
    --accent: #00d4ff; --text: #c8e6f5; --green: #00ff88; --red: #ff4444;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    height: 100vh; display: flex; flex-direction: column; overflow: hidden;
  }
  header {
    display: flex; align-items: center; gap: 16px; padding: 10px 20px;
    background: var(--panel); border-bottom: 1px solid var(--border);
  }
  header h1 { font-family: 'Orbitron', sans-serif; font-size: 1.1rem; color: var(--accent); }
  .status-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--red); }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .main { flex: 1; display: flex; overflow: hidden; }
  #canvas-wrap { flex: 1; position: relative; background: var(--bg); }
  canvas { display: block; cursor: crosshair; }
  aside { width: 220px; background: var(--panel); border-left: 1px solid var(--border); }
  #player-list { padding: 10px; font-size: 0.8rem; }
  .is-self { color: var(--accent); font-weight: bold; }
</style>
</head>
<body>

<header>
  <div class="status-dot" id="dot"></div>
  <h1>AGAR.IO</h1>
  <div style="flex:1"></div>
  <input id="name-input" type="text" placeholder="Ime..." style="background:none; border:1px solid var(--border); color:#fff; padding:4px;">
</header>

<div class="main">
  <div id="canvas-wrap"><canvas id="canvas"></canvas></div>
  <aside><div id="player-list"></div></aside>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const WORLD_W = 2000, WORLD_H = 2000;

let ws, selfState = null;
const others = new Map(), food = new Map();
let cam = { x: 1000, y: 1000 };
let mouse = { x: 0, y: 0 };

function resize() {
  canvas.width = document.getElementById("canvas-wrap").clientWidth;
  canvas.height = document.getElementById("canvas-wrap").clientHeight;
}
window.addEventListener("resize", resize);
resize();

window.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

function connect() {
  ws = new WebSocket("ws://localhost:8765");
  ws.onopen = () => document.getElementById("dot").classList.add("connected");
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === "init") {
      selfState = msg.self;
      msg.players.forEach(p => others.set(p.id, p));
      msg.food.forEach(f => food.set(f.id, f));
      refreshList();
    } else if (msg.type === "food_update") {
      food.delete(msg.eaten);
      food.set(msg.new_item.id, msg.new_item);
      if (selfState && msg.eater === selfState.id) selfState.radius = msg.new_radius;
      else if (others.has(msg.eater)) others.get(msg.eater).radius = msg.new_radius;
    } else if (msg.type === "player_moved") {
      if (others.has(msg.id)) {
        let p = others.get(msg.id);
        p.x = msg.x; p.y = msg.y; p.radius = msg.radius;
      }
    } else if (msg.type === "player_joined") {
      others.set(msg.player.id, msg.player);
      refreshList();
    } else if (msg.type === "player_left") {
      others.delete(msg.id);
      refreshList();
    } else if (msg.type === "player_eaten") {
      others.delete(msg.eaten);
      if (selfState && msg.eater === selfState.id) selfState.radius = msg.new_radius;
      else if (others.has(msg.eater)) others.get(msg.eater).radius = msg.new_radius;
      refreshList();
    } else if (msg.type === "died") {
      alert("Pojeden si!");
      ws.close();
    }
  };
}

function draw() {
  if (selfState) {
    // 1. Mehanika kretanja
    const dx = mouse.x - canvas.width / 2;
    const dy = mouse.y - canvas.height / 2;
    const dist = Math.sqrt(dx*dx + dy*dy);

    if (dist > 5) { // Deadzone da ne treperi kad je miš u centru
        // Fiksna brzina koja zavisi samo od veličine
        const baseSpeed = 4; 
        const speed = baseSpeed * Math.pow(selfState.radius / 22, -0.4); 
        
        // Ugao ka mišu
        const angle = Math.atan2(dy, dx);
        
        // Pomeranje zasnovano na uglu (pravcu), ne na daljini miša
        selfState.x += Math.cos(angle) * speed;
        selfState.y += Math.sin(angle) * speed;
    }

    selfState.x = Math.max(0, Math.min(WORLD_W, selfState.x));
    selfState.y = Math.max(0, Math.min(WORLD_H, selfState.y));

    // Kamera prati glatko
    cam.x += (selfState.x - cam.x) * 0.1;
    cam.y += (selfState.y - cam.y) * 0.1;

    if (ws.readyState === 1) ws.send(JSON.stringify({ type: "move", x: selfState.x, y: selfState.y }));
  }

  ctx.fillStyle = "#050a0f";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(canvas.width/2 - cam.x, canvas.height/2 - cam.y);

  // Vidljiva granica sveta
  ctx.strokeStyle = "#00d4ff";
  ctx.lineWidth = 10;
  ctx.strokeRect(0, 0, WORLD_W, WORLD_H);
  
  // Pozadinska mreža
  ctx.strokeStyle = "rgba(26,58,92,0.3)";
  ctx.lineWidth = 1;
  for(let i=0; i<=WORLD_W; i+=100) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,WORLD_H); ctx.stroke(); }
  for(let i=0; i<=WORLD_H; i+=100) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(WORLD_W,i); ctx.stroke(); }

  // Hrana
  food.forEach(f => {
    ctx.beginPath(); ctx.arc(f.x, f.y, 6, 0, Math.PI*2);
    ctx.fillStyle = f.color; ctx.fill();
  });

  // Igrači
  others.forEach(p => drawPlayer(p));
  if (selfState) drawPlayer(selfState, true);

  ctx.restore();
  requestAnimationFrame(draw);
}

function drawPlayer(p, isSelf = false) {
  ctx.save();
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
  ctx.fillStyle = p.color;
  ctx.fill();
  ctx.strokeStyle = isSelf ? "#fff" : "rgba(255,255,255,0.2)";
  ctx.lineWidth = isSelf ? 3 : 1;
  ctx.stroke();
  
  ctx.fillStyle = "#fff";
  ctx.font = "bold 12px 'Share Tech Mono'";
  ctx.textAlign = "center";
  ctx.fillText(p.name, p.x, p.y + 5);
  ctx.restore();
}

function refreshList() {
  const list = document.getElementById("player-list");
  list.innerHTML = "<h4>Igrači:</h4>";
  const all = selfState ? [{...selfState, isSelf:true}, ...others.values()] : [...others.values()];
  all.forEach(p => {
    const div = document.createElement("div");
    if(p.isSelf) div.className = "is-self";
    div.textContent = p.name + " (" + Math.floor(p.radius) + ")";
    list.appendChild(div);
  });
}

connect();
draw();
</script>
</body>
</html>
